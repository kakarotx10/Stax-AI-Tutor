<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-soc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0B0F"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="stroke-soc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="50%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0047CC"/>
    </linearGradient>
    <radialGradient id="hi-soc" cx="0.5" cy="0.5" r="0.5">
      <stop offset="60%" stop-color="#0A84FF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Full bleed (no rounded corners — platforms apply their own circular mask) -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg-soc)"/>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#hi-soc)"/>

  <!-- Mark, scaled to roughly 50% of canvas with extra safe-area padding for circle crop -->
  <g transform="translate(256, 256)">
    <g fill="none" stroke="url(#stroke-soc)" stroke-width="55" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 400 110 L 145 110"/>
      <path d="M 145 110 L 370 400"/>
      <path d="M 370 400 L 115 400"/>
    </g>
    <circle cx="400" cy="110" r="26" fill="#FFFFFF"/>
  </g>
</svg>
