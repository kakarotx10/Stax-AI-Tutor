<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0B0F"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="stroke-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="50%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0047CC"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: iOS-style continuous-curvature radius (~22.37% of side) -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="url(#bg-grad)"/>

  <!-- Subtle inner gradient highlight, top-left -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="url(#hi)" opacity="0.4"/>
  <defs>
    <radialGradient id="hi" cx="0.2" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#1B2540" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Mark, scaled from 64-grid to ~640px box, centered. Original coords ×10, offset by (192,192) -->
  <g transform="translate(192, 192)" filter="url(#glow)">
    <g fill="none" stroke="url(#stroke-grad)" stroke-width="80" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 500 140 L 180 140"/>
      <path d="M 180 140 L 460 500"/>
      <path d="M 460 500 L 140 500"/>
    </g>
    <circle cx="500" cy="140" r="35" fill="#FFFFFF"/>
  </g>
</svg>
