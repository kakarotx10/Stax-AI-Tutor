name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test --if-present
        env:
          JWT_SECRET: test-secret-32-chars-minimum-length-ok
          NEXTAUTH_SECRET: test-secret-32-chars-minimum-length-ok
          MONGODB_URI: mongodb://localhost:27017/test
